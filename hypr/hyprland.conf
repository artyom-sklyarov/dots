plugin = /usr/lib/libhyprexpo.so
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
monitor = , preferred, auto, 1

$terminal = kitty
$fileManager = dolphin
$menu = vicinae toggle

exec-once = eww open bar
exec-once = python3 ~/.config/eww/scripts/brightness-slider.py
exec-once = swaync
exec-once = hypridle
exec-once = hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = vicinae server

layerrule = blur on, ignore_alpha 0.5, match:namespace vicinae
exec-once = awww-daemon & sleep 1 && awww img --resize crop /home/ozzy/Pictures/Wallpapers/wp14555878.jpg

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_THEME,adw-gtk3-dark

cursor {
    no_hardware_cursors = true
}

# Clamshell mode: only disable laptop panel if an external monitor is active,
# otherwise closing the lid would leave Hyprland with zero outputs.
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/lid.sh close
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/lid.sh open
exec = grep -q closed /proc/acpi/button/lid/*/state && ~/.config/hypr/lid.sh close

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(a0a0a0ff)
    col.inactive_border = rgba(282828ff)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 4
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     7,     easeOutQuint, fade
    animation = workspacesIn,  1,     5,     easeOutQuint, fade
    animation = workspacesOut, 1,     7,     easeOutQuint, fade
    animation = specialWorkspace, 1, 1, almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 1
}

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = -0.15

    touchpad {
        natural_scroll = true
        scroll_factor = 0.1
        clickfinger_behavior = true
    }
}

gesture = 3, horizontal, scale:0.1, workspace

device {
    name = logitech-g304-1
    sensitivity = -0.35
}

device {
    name = logitech-usb-receiver-mouse
    sensitivity = -0.35
}

device {
    name = apple-inc.-magic-trackpad-usb-c
    sensitivity = 0.15
    scroll_factor = 0.15
}

device {
    name = beken-2.4g-wireless-device-1
    sensitivity = -0.35
}

$mainMod = SUPER

bind = CTRL ALT, delete, exec, kitty --class hyprland-overview --title 'Window Overview' -o remember_window_size=no -o initial_window_width=100c -o initial_window_height=30c -o confirm_os_window_close=0 -e python3 ~/.config/eww/scripts/window-overview.py
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, submap, movewindow
submap = movewindow
bind = , 1, movewindow, mon:DP-3
bind = , 1, submap, reset
bind = , 2, movewindow, mon:DP-1
bind = , 2, submap, reset
bind = , 3, movewindow, mon:eDP-1
bind = , 3, submap, reset
bind = , escape, submap, reset
submap = reset

bind = $mainMod SHIFT, M, submap, moveworkspace
submap = moveworkspace
bind = , 1, movecurrentworkspacetomonitor, DP-3
bind = , 1, submap, reset
bind = , 2, movecurrentworkspacetomonitor, DP-1
bind = , 2, submap, reset
bind = , 3, movecurrentworkspacetomonitor, eDP-1
bind = , 3, submap, reset
bind = , escape, submap, reset
submap = reset
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = , F4, exec, $menu
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, P, pseudo,

bind = $mainMod ALT, left, exec, ~/.config/hypr/swap-or-move.sh l
bind = $mainMod ALT, right, exec, ~/.config/hypr/swap-or-move.sh r
bind = $mainMod ALT, up, exec, ~/.config/hypr/swap-or-move.sh u
bind = $mainMod ALT, down, exec, ~/.config/hypr/swap-or-move.sh d

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, code:83, movefocus, l
bind = $mainMod, code:85, movefocus, r
bind = $mainMod, code:80, movefocus, u
bind = $mainMod, code:88, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor, 6
bind = $mainMod, 7, focusworkspaceoncurrentmonitor, 7
bind = $mainMod, 8, focusworkspaceoncurrentmonitor, 8
bind = $mainMod, 9, focusworkspaceoncurrentmonitor, 9
bind = $mainMod, 0, focusworkspaceoncurrentmonitor, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, S, togglespecialworkspace, Special
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:Special

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, mouse:274, movewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/brightness.sh up 5
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/brightness.sh down 5

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindp = ALT, code:49, exec, ~/.config/hypr/switch-lang.sh

bind = ALT SHIFT, 4, exec, bash -c 'grim -g "$(slurp)" - | satty --filename - --output-filename /tmp/satty-screenshot.png --copy-command wl-copy'
bind = CTRL ALT SHIFT, 4, exec, bash -c 'grim -g "$(slurp)" - | wl-copy'

bind = SUPER SHIFT, F23, exec, kitty claude --chrome

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

debug {
    disable_logs = false
    enable_stdout_logs = true
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = window-overview
    match:class = hyprland-overview
    float = yes
    size = 70% 60%
    center = true
    animation = popin
}

windowrule {
    name = chromium-vfs-to-ws10
    match:class = ^chromium-browser$
    match:title = Google Chrome for Testing$
    workspace = 10 silent
}

windowrule {
    name = transparent-utilities
    match:class = ^(org\.kde\.dolphin|com\.saivert\.pwvucontrol|pavucontrol|blueman-manager|nm-connection-editor|nm-applet)$
    opacity = 0.8
}

