general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = /tmp/hyprlock-wallpaper
    blur_passes = 3
    blur_size = 6
    brightness = 0.7
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(ffffffee)
    font_size = 72
    font_family = SF Pro Display, DejaVu Sans
    halign = center
    valign = center
    position = 0, 200
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(00000088)
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %B %-d"
    color = rgba(ffffffcc)
    font_size = 18
    font_family = SF Pro Display, DejaVu Sans
    halign = center
    valign = center
    position = 0, 140
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(00000088)
}

label {
    monitor =
    text = $USER
    color = rgba(ffffffcc)
    font_size = 14
    font_family = SF Pro Display, DejaVu Sans
    halign = center
    valign = center
    position = 0, 30
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(00000088)
}

input-field {
    monitor =
    size = 220, 36
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgba(00000000)
    inner_color = rgba(ffffff22)
    font_color = rgba(ffffffdd)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    halign = center
    valign = center
    position = 0, -20
    rounding = 18
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(00000066)
}
